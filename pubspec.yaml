name: student_attendance
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  table_calendar: ^3.0.9
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  file_picker: ^10.3.3
  excel: ^4.0.4
  pdf: ^3.11.0             # Để tạo file PDF
  path_provider: ^2.1.3     # Để tìm đúng đường dẫn lưu file trên điện thoại
  permission_handler: ^12.0.1 # Để xin quyền truy cập bộ nhớ từ người dùng

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  intl: ^0.18.1
  device_info_plus: ^12.2.0 # Thêm dòng này
  fl_chart: ^0.68.0
  mobile_scanner: ^7.1.2
  qr_flutter: ^4.1.0
  provider: ^6.1.2
  package_info_plus: ^9.0.0 # Để lấy phiên bản ứng dụng
  url_launcher: ^6.3.0
  app_links: ^6.0.0
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.1
  share_plus: ^12.0.2
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

  flutter_lints: ^4.0.0
flutter_launcher_icons:
  android: true
  image_path: "assets/icon/logo_app.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/logo_app.png"
  adaptive_icon_padding: 20
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/logo_app.png